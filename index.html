<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NotoNote 原型</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f6f8;
      --panel: #ffffff;
      --ink: #171a1f;
      --muted: #6f7480;
      --line: #dfe3ea;
      --soft: #eef1f6;
      --purple: #7657f2;
      --purple-soft: #ede8ff;
      --blue: #2766d8;
      --blue-soft: #e7f0ff;
      --green: #167c50;
      --green-soft: #e7f6ee;
      --amber: #a86408;
      --amber-soft: #fff1da;
      --rose: #bd3d50;
      --rose-soft: #ffe8ec;
      --shadow: 0 18px 44px rgba(28, 34, 45, .10);
      --radius: 8px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 1120px;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }

    button, input, textarea, select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: 64px 1fr;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, .92);
      backdrop-filter: blur(18px);
      position: sticky;
      top: 0;
      z-index: 4;
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 12px;
      min-width: 0;
    }

    .brand strong {
      font-size: 21px;
      line-height: 1;
      letter-spacing: 0;
    }

    .brand span {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-btn, .text-btn {
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      border-radius: 8px;
      color: #fff;
      background: var(--ink);
      padding: 0 12px;
      white-space: nowrap;
    }

    .icon-btn {
      width: 36px;
      padding: 0;
    }

    .text-btn.secondary, .icon-btn.secondary {
      color: var(--ink);
      background: var(--soft);
    }

    .icon {
      width: 16px;
      height: 16px;
      display: inline-block;
      flex: 0 0 auto;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(328px, 25vw) minmax(430px, 1fr) 374px;
      gap: 18px;
      padding: 18px;
      min-height: 0;
    }

    .panel {
      min-height: 0;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 10px 28px rgba(22, 26, 34, .05);
      overflow: hidden;
    }

    .panel-head {
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfe;
    }

    .panel-title {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .panel-title h2 {
      margin: 0;
      font-size: 15px;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: 0;
    }

    .panel-title small {
      color: var(--muted);
      font-size: 12px;
      display: block;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 260px;
    }

    .panel-body {
      height: calc(100vh - 134px);
      overflow: auto;
      padding: 14px;
    }

    .source-actions {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }

    .upload {
      position: relative;
    }

    .upload input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .source-btn {
      width: 100%;
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      border-radius: 8px;
      color: var(--ink);
      background: var(--soft);
      white-space: nowrap;
      font-size: 13px;
    }

    .ai-controls {
      display: grid;
      grid-template-columns: minmax(160px, 1fr) 150px 112px;
      gap: 8px;
      align-items: center;
      width: min(100%, 470px);
    }

    .api-input, .model-select {
      width: 100%;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 0 10px;
      font-size: 12px;
      outline: none;
    }

    .api-input:focus, .model-select:focus {
      border-color: rgba(118, 87, 242, .72);
      box-shadow: 0 0 0 3px rgba(118, 87, 242, .12);
    }

    .ai-run {
      width: 100%;
      background: var(--purple);
      color: #fff;
    }

    .section-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      margin: 14px 0 8px;
    }

    .user-scope {
      display: grid;
      grid-template-columns: 74px 1fr;
      gap: 8px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfe;
      padding: 8px;
      margin-bottom: 12px;
    }

    .user-scope label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .user-select {
      width: 100%;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 0 10px;
      font-size: 13px;
      outline: none;
    }

    .cloud-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfcfe;
      padding: 10px;
      margin-bottom: 12px;
      display: grid;
      gap: 8px;
    }

    .cloud-card h3 {
      margin: 0;
      font-size: 13px;
      line-height: 1.2;
    }

    .cloud-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 7px;
    }

    .cloud-row {
      display: grid;
      grid-template-columns: 1fr 82px;
      gap: 7px;
    }

    .cloud-status {
      min-height: 18px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
      word-break: break-all;
    }

    .cloud-status a {
      color: var(--purple);
      font-weight: 700;
      text-decoration: none;
    }

    .table {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background: #fff;
    }

    .row {
      display: grid;
      align-items: start;
      border-bottom: 1px solid var(--line);
      min-height: 54px;
    }

    .row:last-child {
      border-bottom: 0;
    }

    .transcript-row {
      grid-template-columns: 58px 54px 1fr;
      gap: 8px;
      padding: 10px;
      font-size: 12px;
    }

    .time {
      color: var(--muted);
      font-family: var(--mono);
      white-space: nowrap;
    }

    .speaker {
      font-weight: 700;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .utterance {
      line-height: 1.45;
      color: #2a2f38;
    }

    .action-row {
      grid-template-columns: 48px 70px 1fr 46px;
      gap: 8px;
      padding: 10px;
      text-align: left;
      width: 100%;
      background: #fff;
      color: inherit;
    }

    .action-row:hover, .action-row.active {
      background: var(--purple-soft);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 42px;
      height: 22px;
      border-radius: 999px;
      padding: 0 8px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      background: var(--soft);
      color: var(--ink);
    }

    .tag.nod {
      background: var(--green-soft);
      color: var(--green);
    }

    .tag.tilt {
      background: var(--amber-soft);
      color: var(--amber);
    }

    .tag.look {
      background: var(--blue-soft);
      color: var(--blue);
    }

    .tag.raise {
      background: var(--rose-soft);
      color: var(--rose);
    }

    .tag.still {
      background: #f0f2f5;
      color: #59606b;
    }

    .confidence {
      font-family: var(--mono);
      color: var(--muted);
      text-align: right;
      font-size: 12px;
    }

    .pipeline {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 12px;
      height: 100%;
    }

    .steps {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
    }

    .step {
      min-height: 82px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px;
      background: #fff;
      position: relative;
      overflow: hidden;
    }

    .step.done {
      border-color: rgba(22, 124, 80, .35);
      background: var(--green-soft);
    }

    .step.active {
      border-color: rgba(118, 87, 242, .42);
      background: var(--purple-soft);
    }

    .step b {
      display: block;
      font-size: 12px;
      line-height: 1.25;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .step p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .work-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.04fr) minmax(0, .96fr);
      gap: 12px;
      min-height: 0;
    }

    .work-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      min-height: 0;
      overflow: hidden;
    }

    .work-card header {
      min-height: 42px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 0 12px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfe;
    }

    .work-card header h3 {
      margin: 0;
      font-size: 13px;
      line-height: 1.2;
    }

    .work-content {
      padding: 12px;
      max-height: calc(100vh - 276px);
      overflow: auto;
    }

    .evidence {
      display: grid;
      gap: 10px;
    }

    .kv {
      display: grid;
      grid-template-columns: 78px 1fr;
      gap: 10px;
      font-size: 13px;
      line-height: 1.45;
      padding-bottom: 10px;
      border-bottom: 1px dashed var(--line);
    }

    .kv:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .kv span:first-child {
      color: var(--muted);
      white-space: nowrap;
    }

    .quote {
      border-left: 3px solid var(--purple);
      padding: 8px 10px;
      background: #faf9ff;
      line-height: 1.55;
      font-size: 13px;
    }

    .json-box {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #12161f;
      color: #dfe7ff;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.55;
      padding: 12px;
      white-space: pre-wrap;
      overflow: auto;
      min-height: 210px;
    }

    .merge-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .merge-item {
      display: grid;
      grid-template-columns: 28px 1fr auto;
      gap: 8px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 8px;
      font-size: 12px;
      background: #fff;
    }

    .merge-item strong {
      font-size: 13px;
    }

    .merge-item small {
      color: var(--muted);
      display: block;
      margin-top: 2px;
      line-height: 1.35;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      justify-self: center;
      background: var(--purple);
    }

    .phone-shell {
      height: calc(100vh - 134px);
      display: grid;
      place-items: center;
      padding: 14px;
      background:
        linear-gradient(90deg, rgba(31, 36, 48, .05) 1px, transparent 1px),
        linear-gradient(180deg, rgba(31, 36, 48, .05) 1px, transparent 1px);
      background-size: 22px 22px;
    }

    .phone {
      width: min(100%, 332px);
      height: min(100%, 704px);
      min-height: 620px;
      border-radius: 30px;
      border: 9px solid #171a1f;
      background: #f8f9fb;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .phone-status {
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 17px;
      font-size: 11px;
      color: #171a1f;
      background: #fff;
    }

    .phone-header {
      padding: 10px 14px 12px;
      background: #fff;
      border-bottom: 1px solid var(--line);
    }

    .phone-header h3 {
      margin: 0 0 5px;
      font-size: 16px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .phone-header p {
      margin: 0;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.35;
    }

    .phone-body {
      overflow: auto;
      min-height: 0;
      scrollbar-gutter: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(23, 26, 31, .26) transparent;
    }

    .phone-body::-webkit-scrollbar {
      width: 8px;
    }

    .phone-body::-webkit-scrollbar-track {
      background: transparent;
    }

    .phone-body::-webkit-scrollbar-thumb {
      background: rgba(23, 26, 31, .28);
      border-radius: 999px;
      border: 2px solid transparent;
      background-clip: content-box;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
      border-bottom: 1px solid var(--line);
      background: #fff;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    .tabs button {
      height: 37px;
      color: var(--muted);
      background: transparent;
      font-size: 12px;
      border-bottom: 2px solid transparent;
    }

    .tabs button.active {
      color: var(--ink);
      border-color: var(--purple);
      font-weight: 700;
    }

    .filters {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      background: #fff;
      border-bottom: 1px solid var(--line);
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      cursor: grab;
      user-select: none;
    }

    .filters::-webkit-scrollbar {
      display: none;
    }

    .filters.dragging {
      cursor: grabbing;
    }

    .filter {
      flex: 0 0 auto;
      height: 27px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      border-radius: 999px;
      color: var(--ink);
      background: var(--soft);
      font-size: 11px;
      padding: 0 9px;
      white-space: nowrap;
    }

    .filter.active {
      font-weight: 700;
      box-shadow: inset 0 0 0 1.5px currentColor;
    }

    .filter-icon {
      width: 12px;
      height: 12px;
      flex: 0 0 auto;
      background: currentColor;
      -webkit-mask: var(--icon-url) center / contain no-repeat;
      mask: var(--icon-url) center / contain no-repeat;
    }

    .filter-icon.all {
      color: #171a1f;
      --icon-url: url("ui-icons/共鸣.svg");
    }

    .filter.all {
      color: #171a1f;
      background: #eef1f6;
    }

    .filter.resonance,
    .filter-icon.resonance {
      color: var(--green);
    }

    .filter.resonance {
      background: var(--green-soft);
    }

    .filter-icon.resonance {
      --icon-url: url("ui-icons/共鸣.svg");
    }

    .filter.doubt,
    .filter-icon.doubt {
      color: var(--rose);
    }

    .filter.doubt {
      background: var(--rose-soft);
    }

    .filter-icon.doubt {
      --icon-url: url("ui-icons/存疑.svg");
    }

    .filter.spark,
    .filter-icon.spark {
      color: var(--blue);
    }

    .filter.spark {
      background: var(--blue-soft);
    }

    .filter-icon.spark {
      --icon-url: url("ui-icons/灵感闪念.svg");
    }

    .filter.claim,
    .filter-icon.claim {
      color: var(--amber);
    }

    .filter.claim {
      background: var(--amber-soft);
    }

    .filter-icon.claim {
      --icon-url: url("ui-icons/核心主张.svg");
    }

    .phone-section {
      padding: 12px;
      display: grid;
      gap: 10px;
      margin-right: -8px;
      padding-right: 12px;
    }

    .mobile-card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .mobile-card.highlight {
      border-color: rgba(118, 87, 242, .46);
      box-shadow: 0 8px 22px rgba(118, 87, 242, .14);
    }

    .mobile-card header {
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 9px;
      align-items: start;
      padding: 10px;
      border-bottom: 1px solid var(--line);
    }

    .card-icon {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
    }

    .card-icon::before {
      content: "";
      width: 18px;
      height: 18px;
      display: block;
      background: currentColor;
      -webkit-mask: var(--icon-url) center / contain no-repeat;
      mask: var(--icon-url) center / contain no-repeat;
    }

    .card-icon.resonance {
      color: var(--green);
      background: var(--green-soft);
      --icon-url: url("ui-icons/共鸣.svg");
    }

    .card-icon.doubt {
      color: var(--rose);
      background: var(--rose-soft);
      --icon-url: url("ui-icons/存疑.svg");
    }

    .card-icon.spark {
      color: var(--blue);
      background: var(--blue-soft);
      --icon-url: url("ui-icons/灵感闪念.svg");
    }

    .card-icon.claim {
      color: var(--amber);
      background: var(--amber-soft);
      --icon-url: url("ui-icons/核心主张.svg");
    }

    .mobile-card h4 {
      margin: 0;
      font-size: 13px;
      line-height: 1.28;
      letter-spacing: 0;
    }

    .mobile-card time {
      color: var(--muted);
      font-size: 11px;
      font-family: var(--mono);
      white-space: nowrap;
      display: block;
      margin-top: 4px;
    }

    .mobile-card .content {
      padding: 10px;
      display: grid;
      gap: 8px;
      font-size: 12px;
      line-height: 1.55;
      color: #2b313b;
    }

    .source-line {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
      border-left: 3px solid var(--line);
      padding-left: 8px;
    }

    .thought-list {
      display: grid;
      gap: 6px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .thought-list li {
      display: grid;
      grid-template-columns: 20px 1fr;
      gap: 7px;
      align-items: start;
      color: #3c4450;
      font-size: 11px;
      line-height: 1.45;
    }

    .thought-list b {
      width: 20px;
      height: 20px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      color: var(--blue);
      background: var(--blue-soft);
      font-size: 10px;
      line-height: 1;
    }

    .review-line {
      font-size: 12px;
      line-height: 1.5;
      color: #222832;
      font-weight: 700;
    }

    .pill-row {
      display: flex;
      flex-wrap: nowrap;
      gap: 6px;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      cursor: grab;
      user-select: none;
    }

    .pill-row::-webkit-scrollbar {
      display: none;
    }

    .pill-row.dragging {
      cursor: grabbing;
    }

    .mini-pill {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      height: 22px;
      border-radius: 999px;
      padding: 0 8px;
      background: var(--soft);
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }

    .mini-pill.resonance {
      color: var(--green);
      background: var(--green-soft);
    }

    .mini-pill.doubt {
      color: var(--rose);
      background: var(--rose-soft);
    }

    .mini-pill.spark {
      color: var(--blue);
      background: var(--blue-soft);
    }

    .mini-pill.claim {
      color: var(--amber);
      background: var(--amber-soft);
    }

    .empty {
      min-height: 164px;
      display: grid;
      place-items: center;
      border: 1px dashed var(--line);
      border-radius: var(--radius);

  <script>
    const sampleTranscript = [
      {
        start: "00:00:42",
        end: "00:01:16",
        speaker: "闫珂",
        text: "我们今天主要看一下 TT 小程序里专家智能体的定位，它和通用大语言模型的区别到底在哪里。"

        text: "这个问题很关键，如果它只是新奇包装，但没有触发用户主动分享，那它就不是社交传播资产。"
      },
      {

        end: "00:04:58",
        speaker: "聂子寒",
        text: "我觉得可以把免扫码参与和撕开包装后的反馈做在一起，降低门槛，同时让用户自然愿意分享。"
      },
      {
        start: "00:05:03",
        end: "00:05:38",
        speaker: "孙璐",
        text: "这个方向能成立，因为它不是单纯促销，而是把渠道费用转成了一种可以被传播的体验。"
      }
    ];

    const sampleActions = [
      {
        action_id: "N03",
        user: "聂子寒",
        start_time: "00:02:36",
        end_time: "00:02:39",
        action_type: "tilt_head",
        confidence: 0.88,
        imu_feature: "roll_left + still_2.4s",
        notes: "歪头后短暂停顿"
      },
      {
        action_id: "N04",
        user: "聂子寒",
        start_time: "00:03:48",
        end_time: "00:03:51",
        action_type: "nod",
        confidence: 0.91,
        imu_feature: "pitch_repeat_3",
        notes: "连续点头"
      },
      {
        action_id: "N05",
        user: "聂子寒",
        start_time: "00:04:27",
        end_time: "00:04:33",
        action_type: "look_away",
        confidence: 0.82,
        imu_feature: "yaw_right + pause",
        notes: "看向别处并组织语言"
      },
      {
        action_id: "S02",
        user: "孙璐",
        start_time: "00:05:08",
        end_time: "00:05:10",
        action_type: "nod",
        confidence: 0.86,
        imu_feature: "pitch_down_up",
        notes: "重重点头"
      }
    ];

    const steps = [
      { title: "读取双输入", desc: "完整原文 CSV + 动作 JSON" },
      { title: "过滤合并动作", desc: "保留有效映射，合并同句动作" },
      { title: "构建语义窗口", desc: "按 utterance_id 截取前后文" },
      { title: "全文语义判断", desc: "结合全会主题重摘原文" },
      { title: "生成展示结果", desc: "个人卡片 + 云端链接" }
    ];

    const categories = [
      { key: "resonance", label: "共鸣", short: "共" },
      { key: "doubt", label: "存疑", short: "疑" },
      { key: "spark", label: "灵感闪念", short: "灵" },
      { key: "claim", label: "核心主张", short: "主" }
    ];

    let transcript = structuredClone(sampleTranscript);
    let actions = structuredClone(sampleActions);
    let selectedIndex = 0;
    let currentStep = 0;
    let generatedCards = [];
    let aiGeneratedCards = null;
    let aiRawOutput = null;
    let activeFilter = "all";
    let selectedUser = "";
    let meetingTitle = "TT设计学院访谈";

    const $ = (id) => document.getElementById(id);
    const initialParams = new URLSearchParams(window.location.search);
    const defaultSupabaseUrl = "";
    const defaultSupabaseKey = "";
    if (initialParams.get("view") === "phone" || initialParams.has("id") || initialParams.has("result")) {
      document.body.classList.add("phone-only");
    }
    const participantNameMap = {
      user_001: "聂子寒"
    };
    const userDisplayAlias = {
      "受访人C": "陈乐其",
      "受访人Z": "郑炜钰"
    };
    const storageKey = "notonote.prototype.state.v1";

    function getPersistedSettings() {
      return {
        geminiKey: $("geminiKey")?.value || "",
        geminiModel: $("geminiModel")?.value || "gemini-2.5-flash",
        supabaseUrl: $("supabaseUrl")?.value || "",
        supabaseKey: $("supabaseKey")?.value || ""
      };
    }

    function saveState() {
      try {
        localStorage.setItem(storageKey, JSON.stringify({
          ...getPersistedSettings(),
          transcript,
          actions,
          selectedIndex,
          currentStep,
          activeFilter,
          selectedUser,
          meetingTitle,
          aiRawOutput,
          aiGeneratedCards
        }));
      } catch (error) {
        console.warn("NotoNote state was not saved", error);
      }
    }

    function restoreState() {
      try {
        const raw = localStorage.getItem(storageKey);
        if (!raw) return false;
        const state = JSON.parse(raw);
        if (state.geminiKey && $("geminiKey")) $("geminiKey").value = state.geminiKey;
        if (state.geminiModel && $("geminiModel")) $("geminiModel").value = state.geminiModel;
        if (state.supabaseUrl && $("supabaseUrl")) $("supabaseUrl").value = state.supabaseUrl;
        if (state.supabaseKey && $("supabaseKey")) $("supabaseKey").value = state.supabaseKey;
        if (Array.isArray(state.transcript) && Array.isArray(state.actions)) {
          transcript = state.transcript;
          actions = state.actions;
          selectedIndex = Number(state.selectedIndex || 0);
          currentStep = Number(state.currentStep || 0);
          activeFilter = state.activeFilter || "all";
          selectedUser = state.selectedUser || "";
          meetingTitle = state.meetingTitle || meetingTitle;
          aiRawOutput = state.aiRawOutput || null;
          aiGeneratedCards = aiRawOutput && Array.isArray(aiRawOutput.cards)
            ? cardsFromGeminiOutput(aiRawOutput)
            : state.aiGeneratedCards || null;
          return true;
        }
      } catch (error) {
        console.warn("NotoNote state was not restored", error);
      }
      return false;
    }

    function timeToSeconds(time) {
      if (typeof time === "number") return time;
      const parts = String(time).split(":").map(Number);
      if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
      if (parts.length === 2) return parts[0] * 60 + parts[1];
      return Number(parts[0]) || 0;
    }

    function secondsToClock(value) {
      if (typeof value === "string" && value.includes(":")) return value;
      const seconds = Math.max(0, Number(value) || 0);
      const whole = Math.floor(seconds);
      const fraction = Math.round((seconds - whole) * 10);
      const h = String(Math.floor(whole / 3600)).padStart(2, "0");
      const m = String(Math.floor((whole % 3600) / 60)).padStart(2, "0");
      const s = String(whole % 60).padStart(2, "0");
      return `${h}:${m}:${s}${fraction ? `.${fraction}` : ""}`;
    }

    function displayUserName(user) {
      return userDisplayAlias[user] ? `${userDisplayAlias[user]}（${user}）` : user || "用户";
    }

    function getUserOptions() {
      return [...new Set(actions.map(action => action.user).filter(Boolean))];
    }

    function getActiveEntries() {
      const users = getUserOptions();
      if (!selectedUser && users.length) selectedUser = users[0];
      return actions
        .map((action, index) => ({ action, index }))
        .filter(entry => !selectedUser || entry.action.user === selectedUser);
    }

    function getActiveActions() {
      return getActiveEntries().map(entry => entry.action);
    }

    function ensureSelectedScope() {
      const users = getUserOptions();
      if (users.length && (!selectedUser || !users.includes(selectedUser))) {
        selectedUser = users[0];
      }
      if (!users.length) selectedUser = "";

      const activeEntries = getActiveEntries();
      if (activeEntries.length && !activeEntries.some(entry => entry.index === selectedIndex)) {
        selectedIndex = activeEntries[0].index;
      }
      if (!activeEntries.length) selectedIndex = 0;
    }

    function actionLabel(type) {
      return {
        nod: "点头",
        tilt_head: "歪头",
        look_away: "看向别处",
        sudden_raise: "突然抬头",
        stillness: "静止",
        unknown: "未识别"
      }[type] || type;
    }

    function actionTagClass(type) {
      if (type === "nod") return "nod";
      if (type === "tilt_head") return "tilt";
      if (type === "look_away") return "look";
      if (type === "sudden_raise") return "raise";
      if (type === "stillness") return "still";
      if (type === "unknown") return "raise";
      return "";
    }

    function normalizeActionType(type) {
      if (String(type).includes("点头")) return "nod";
      if (String(type).includes("歪头")) return "tilt_head";
      if (String(type).includes("抬头")) return "sudden_raise";
      if (String(type).includes("看向") || String(type).includes("转头") || String(type).includes("摇头")) return "look_away";
      return {
        head_tilt: "tilt_head",
        tilt: "tilt_head",
        tilt_head: "tilt_head",
        nod: "nod",
        head_nod: "nod",
        look_away: "look_away",
        yaw_away: "look_away",
        sudden_raise: "sudden_raise",
        raise_head: "sudden_raise",
        stillness: "stillness",
        still: "stillness",
        unknown: "unknown"
      }[type] || type || "unknown";
    }

    function normalizeRole(role) {
      const value = String(role || "");
      if (value.includes("发言") || value.toLowerCase().includes("speaker")) return "发言者";
      if (value.includes("倾听") || value.toLowerCase().includes("listener")) return "倾听者";
      return "";
    }

    function findSegmentAt(time) {
      const sec = timeToSeconds(time);
      return transcript.find(item => sec >= timeToSeconds(item.start) && sec <= timeToSeconds(item.end))
        || transcript.reduce((best, item) => {
          const distance = Math.abs(sec - timeToSeconds(item.start));
          return !best || distance < best.distance ? { item, distance } : best;
        }, null).item;
    }

    function findSegmentForAction(action) {
      if (action.anchor_segment_id) {
        return transcript.find(item => item.segment_id === action.anchor_segment_id) || null;
      }
      return findSegmentAt(action.start_time);
    }

    function getContext(action) {
      if (action.anchor_segment_id) {
        const index = transcript.findIndex(item => item.segment_id === action.anchor_segment_id);
        if (index >= 0) {
          return transcript.slice(Math.max(0, index - 1), Math.min(transcript.length, index + 2));
        }
      }
      const sec = timeToSeconds(action.start_time);
      const near = transcript.filter(item => {
        const start = timeToSeconds(item.start);
        const end = timeToSeconds(item.end);
        return end >= sec - 55 && start <= sec + 55;
      });
      return near.length ? near : [findSegmentAt(action.start_time)];
    }

    function inferRole(action) {
      if (action.role_computed) return action.role_computed;
      const segment = findSegmentForAction(action);
      return segment.speaker === action.user ? "发言者" : "倾听者";
    }

    function initialSemantic(action, role) {
      if (action.action_type === "stillness") return { category: "noise", semantic: "静止背景" };
      if (action.action_type === "unknown") return { category: "unknown", semantic: "未识别" };
      if (action.preferred_category) {
        const semantic = [action.state_semantic, action.attitude_semantic, action.feedback_semantic].filter(Boolean)[0] || "语义标注";
        return { category: action.preferred_category, semantic };
      }
      if (role === "倾听者" && action.action_type === "tilt_head") return { category: "doubt", semantic: "存疑" };
      if (role === "倾听者" && action.action_type === "nod") return { category: "resonance", semantic: "认同" };
      if (role === "倾听者" && action.action_type === "sudden_raise") return { category: "resonance", semantic: "触动" };
      if (role === "发言者" && action.action_type === "look_away") return { category: "spark", semantic: "推演" };
      if (role === "发言者" && action.action_type === "nod") return { category: "claim", semantic: "传达" };
      return { category: "resonance", semantic: "跟进" };
    }

    function disambiguate(action, role, initial, context) {
      if (action.action_type === "stillness") {
        return {
          category: "noise",
          semantic: "静止背景",
          decision: "放弃标注",
          reason: "静止段通常作为动作前后的状态证据，不单独生成会议纪要卡片。"
        };
      }
      if (action.action_type === "unknown") {
        return {
          category: "unknown",
          semantic: "未识别",
          decision: "低置信",
          reason: "技术侧尚未命中动作规则，暂不进入摘要卡片。"
        };
      }
      if (action.preferred_category) {
        const semantic = [action.state_semantic, action.attitude_semantic, action.feedback_semantic].filter(Boolean)[0] || initial.semantic;
        return {
          category: action.preferred_category,
          semantic,
          decision: action.role_status === "check" ? "待核对" : "保留",
          reason: action.role_status === "check" ? "动作编码已对上原文，但话轮角色需要人工确认。" : "来自动作 CSV 与原文编码锚点的对齐标注。"
        };
      }
      const text = context.map(item => item.text).join("");
      const hasRisk = /不确定|问题|成本|区别|逻辑|需要|但是|会不会/.test(text);
      const hasIdea = /可以|转成|策略|组合|分享|体验/.test(text);
      const hasConclusion = /关键|成立|不是|而是|核心/.test(text);

      if (role === "倾听者" && action.action_type === "tilt_head" && hasRisk) {
        return {
          category: "doubt",
          semantic: "存疑",
          decision: "保留",
          reason: "歪头发生在成本、逻辑和可行性讨论附近，文本也出现不确定表达。"
        };
      }
      if (role === "倾听者" && action.action_type === "nod" && hasConclusion) {
        return {
          category: "resonance",
          semantic: "共鸣",
          decision: "保留",
          reason: "点头靠近对关键判断的确认，动作与文本共同指向认可。"
        };
      }
      if (role === "发言者" && action.action_type === "look_away" && hasIdea) {
        return {
          category: "spark",
          semantic: "灵感闪念",
          decision: "纠正",
          reason: "看向别处不是走神，而是伴随方案组织和新连接生成。"
        };
      }
      if (role === "发言者" && action.action_type === "nod" && hasConclusion) {
        return {
          category: "claim",
          semantic: "核心主张",
          decision: "保留",
          reason: "发言者在总结判断处点头，代表向外传达重点。"
        };
      }
      return {
        category: initial.category,
        semantic: initial.semantic,
        decision: "低置信",
        reason: "上下文支撑不足，原型中暂时降权显示。"
      };
    }

    function cardCopy(action, role, result, context) {
      const source = context.map(item => `${item.speaker}：${item.text}`).join(" ");
      const semanticBits = [action.state_semantic, action.attitude_semantic, action.feedback_semantic].filter(Boolean);
      const common = {
        id: action.action_id,
        time: action.start_time,
        user: action.user,
        role,
        category: result.category,
        semantic: result.semantic,
        decision: result.decision,
        source,
        evidence: `${actionLabel(action.action_type)} / ${action.imu_feature}`,
        reason: result.reason
      };

      if (action.intent_analysis || action.focus_text) {
        const fallbackTitle = `${action.action_id} · ${semanticBits[0] || result.semantic}`;
        return {
          ...common,
          title: action.focus_text || fallbackTitle,
          summary: action.intent_analysis || `${action.user} 的${actionLabel(action.action_type)}被标注为${semanticBits.join(" / ") || result.semantic}。`,
          detail: [
            action.full_behavior ? `全量行为：${action.full_behavior}` : "",
            action.imu_behavior ? `IMU动作：${action.imu_behavior}` : "",
            semanticBits.length ? `语义标签：${semanticBits.join(" / ")}` : ""
          ].filter(Boolean).join("  "),
          semantic: semanticBits[0] || result.semantic
        };
      }

      if (result.category === "doubt") {
        return {
          ...common,
          title: "温感包装的成本逻辑需要复核",
          summary: "用户在成本与获客效率讨论处出现歪头停顿，系统判断这是一个高价值存疑点。",
          detail: "建议后续补充单件包装成本、转化率和分享率假设，再判断它是否真的优于渠道投放。"
        };
      }
      if (result.category === "spark") {
        return {
          ...common,
          title: "把免扫码参与和包装反馈合并",
          summary: "发言者看向别处后提出新的方案连接，系统将其标记为灵感闪念。",
          detail: "思路路径：降低参与门槛 -> 包装反馈 -> 自然分享 -> 渠道费用转化为体验资产。"
        };
      }
      if (result.category === "claim") {
        return {
          ...common,
          title: "把渠道费用转成可传播体验",
          summary: "发言者在总结判断处出现传达型动作，系统提炼为核心主张。",
          detail: "这句话可以作为复盘中的中心论点，用来串联盲盒包装、参与门槛和社交传播。"
        };
      }
      return {
        ...common,
        title: "认可包装体验的传播价值",
        summary: "倾听者点头出现在关键判断附近，系统认为用户对此观点产生共鸣。",
        detail: "可在会后继续追问：哪些设计机制能让用户真的愿意分享。"
      };
    }

    function buildCards() {
      return getActiveActions().map(action => {
        const role = inferRole(action);
        const context = getContext(action);
        const initial = initialSemantic(action, role);
        const result = disambiguate(action, role, initial, context);
        return cardCopy(action, role, result, context);
      }).filter(card => !["低置信", "放弃标注"].includes(card.decision));
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function compactReviewSuggestion(value) {
      let text = String(value || "").trim();
      const suggestMatch = text.match(/建议[:：]\s*([^。；;]+)/);
      if (suggestMatch) text = suggestMatch[1].trim();
      text = text.replace(/^复盘建议[:：]\s*/, "").replace(/\s+/g, "");
      return text.length > 34 ? `${text.slice(0, 32)}...` : text;
    }

    function escapeRegExp(value) {
      return String(value).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function stripLeadingSubject(value) {
      let text = String(value || "").trim();
      const subjects = [
        selectedUser,
        displayUserName(selectedUser),
        userDisplayAlias[selectedUser],
        ...Object.keys(userDisplayAlias),
        ...Object.values(userDisplayAlias)
      ].filter(Boolean);
      const escapedSubjects = [...new Set(subjects)].map(escapeRegExp);
      const subjectPattern = ["受访人[A-Z]", "用户", "参会者", ...escapedSubjects].join("|");
      return text.replace(new RegExp(`^(?:${subjectPattern})\\s*(认为|认同|质疑|提出|关注|担心|意识到|强调|觉得|说明|表达|指出|表示|判断|发现|肯定)`), "$1");
    }

    function cleanCardDisplayText(value) {
      const text = String(value || "")
        .replace(/(?:TT\d+_)?[A-Z]+\d+/g, "")
        .replace(/[（(][^）)]*(点头|歪头|摇头|转头|抬头|头部|视线|摆动|动作)[^）)]*[）)]/g, "")
        .replace(/(?:倾听者|发言者)?(?:点头|歪头|看向侧方|看向别处|头部动作|动作)[^，。；;]*[，,]/g, "")
        .replace(/，{2,}/g, "，")
        .replace(/。{2,}/g, "。")
        .replace(/\s{2,}/g, " ")
        .trim();
      return stripLeadingSubject(text);
    }

      $("evidenceView").innerHTML = `

      `;
    }

    function setupPillDrag() {

    function setupHorizontalDrag(scroller) {
      if (!scroller || scroller.dataset.dragReady) return;
      scroller.dataset.dragReady = "true";
      let isDown = false;
      let startX = 0;
      let startLeft = 0;

      scroller.addEventListener("mousedown", (event) => {
        isDown = true;
        startX = event.pageX;
        startLeft = scroller.scrollLeft;
        scroller.dataset.didDrag = "false";
        scroller.classList.add("dragging");
      });

      scroller.addEventListener("mousemove", (event) => {
        if (!isDown) return;
        event.preventDefault();
        if (Math.abs(event.pageX - startX) > 4) scroller.dataset.didDrag = "true";
        scroller.scrollLeft = startLeft - (event.pageX - startX);
      });

      const stopDrag = () => {
        isDown = false;
        scroller.classList.remove("dragging");
        window.setTimeout(() => {
          scroller.dataset.didDrag = "false";
        }, 0);
      };

      scroller.addEventListener("mouseup", stopDrag);
      scroller.addEventListener("mouseleave", stopDrag);
    }

      return `${speaker}：${source}`;

    function parseCsv(text) {
      const lines = text.trim().split(/\r?\n/).filter(Boolean);
      if (lines.length < 2) return [];
      const headers = splitCsvLine(lines[0]).map(item => item.trim());
      return lines.slice(1).map(line => {
        const cells = splitCsvLine(line);
        return headers.reduce((row, header, index) => {
          row[header] = cells[index] || "";
          return row;
        }, {});
      }).map((row, index) => ({
        action_id: row.action_id || row.id || `A${String(index + 1).padStart(2, "0")}`,
        user: row.user || row.name || "用户",
        start_time: row.start_time || row.start || "00:00:00",
        end_time: row.end_time || row.end || row.start_time || "00:00:00",
        action_type: normalizeActionType(row.action_type || row.type || "nod"),
        confidence: Number(row.confidence || 0.8),
        imu_feature: row.imu_feature || row.feature || "",
        notes: row.notes || row.note || ""
      }));
    }

    function parseActionEventsJson(text) {
      const data = JSON.parse(text);
      if (data.segments && data.actions) {
        loadAlignedData(data);
        return [];
      }
      const events = Array.isArray(data) ? data : data.events || data.action_events || [];
      const participantId = data.participant_id || data.user || data.user_id || "用户";
      const defaultUser = participantNameMap[participantId] || participantId;
      const offset = Number(data.recording_offset_seconds || data.offset_seconds || data.start_offset || 0);

      return events.map((event, index) => {
        const debug = event.debug || {};
        const startSeconds = Number(event.start_time ?? event.start ?? 0) + offset;
        const endSeconds = Number(event.end_time ?? event.end ?? event.start_time ?? 0) + offset;
        const feature = [
          debug.dominant_axis ? `${debug.dominant_axis} axis` : "",
          Number.isFinite(Number(debug.dominant_peak)) ? `peak ${debug.dominant_peak}` : "",
          Number.isFinite(Number(debug.duration_s)) ? `${Number(debug.duration_s).toFixed(2)}s` : "",
          Number.isFinite(Number(debug.axis_ratio)) ? `ratio ${Number(debug.axis_ratio).toFixed(2)}` : ""
        ].filter(Boolean).join(" · ");

        return {
          action_id: event.event_id || event.action_id || `motion_${String(index + 1).padStart(4, "0")}`,
          user: participantNameMap[event.participant_id] || event.user || event.participant_id || defaultUser,
          start_time: secondsToClock(startSeconds),
          end_time: secondsToClock(endSeconds),
          action_type: normalizeActionType(event.action_type || event.type),
          confidence: Number(event.confidence || 0),
          imu_feature: event.imu_feature || feature,
          notes: event.notes || debug.reason || event.action_type || "",
          role_computed: normalizeRole(event.role || event.user_role || event.talk_role || event.speaker_role || event["话轮角色"])
        };
      });
    }

    function clearAiResults() {
      aiGeneratedCards = null;
      aiRawOutput = null;
    }

    function semanticTypeToCategory(type) {
      if (type === "存疑") return "doubt";
      if (type === "灵感闪念") return "spark";
      if (type === "核心主张") return "claim";
      return "resonance";
    }

    function categoryToSemanticType(category) {
      return {
        resonance: "共鸣",
        doubt: "存疑",
        spark: "灵感闪念",
        claim: "核心主张"
      }[category] || category;
    }

    function buildSemanticActionPayload() {
      return getActiveActions().map(action => {
        const role = inferRole(action);
        const context = getContext(action);
        const anchor = findSegmentForAction(action) || context[Math.floor(context.length / 2)] || {};
        return {
          action_id: action.action_id,
          user: action.user,
          role,
          action_type: actionLabel(action.action_type),
          action_type_code: action.action_type,
          action_time: `${action.start_time || ""}-${action.end_time || action.start_time || ""}`,
          anchor: {
            speaker: anchor.speaker || "",
            time: anchor.start || "",
            text: anchor.text || ""
          },
          context: context.map(item => ({
            time: item.start,
            speaker: item.speaker,
            text: item.text
          }))
        };
      });
    }

    function buildGeminiPrompt() {
      const payload = buildSemanticActionPayload();
      return `你是 NotoNote 的会议动作语义筛选器。当前只分析用户「${displayUserName(selectedUser)}」的动作。请基于动作发生点前后的会议原文，筛选出少量真正值得进入该用户个性化会议纪要的高价值卡片。

任务：
1. 对每个动作读取 role、action_type、anchor、context。
2. 判断该动作对应的原文是否有会议复盘价值。默认倾向丢弃，只有观点、分歧、疑问、决策、洞察、用户偏好、产品机会、明确行动价值足够强时才 keep=true。
3. 如果 keep=true，请按角色和动作语义输出一种 semantic_type：
   - 倾听者：共鸣、存疑
   - 发言者：灵感闪念、核心主张
4. 不要把动作标签机械等同于语义。必须结合原文判断。
5. 输出必须是严格 JSON，不要 Markdown，不要解释。

筛选强度：
- 宁缺毋滥。一般保留 25%-45% 的动作即可；如果输入约 20 个动作，通常保留 5-9 个。
- 以下情况必须 keep=false：寒暄、试音、确认能否听见、单纯“对/嗯/好的”、重复前文、无信息量附和、只表达礼貌、没有明确观点的过渡句。
- 同一段话附近多个动作含义重复时，只保留最有代表性的一条。

source_excerpt 要求：
- 必须从 context 中摘取真正有信息价值的原文，不要摘寒暄、口头禅、过渡语。
- 只摘 1-2 句，20-90 个中文字符左右。
- 同时输出 source_speaker，必须是该 source_excerpt 对应的真实发言者。
- source_excerpt 只写原文内容，不要在开头重复写发言者，界面会自动拼接。
- 如果找不到高价值原文，keep=false，不要勉强生成卡片。

文案要求：
- core_viewpoint、interpretation、review_suggestion 都不要以当前用户或动作用户作主语。不要写“受访人Z认同……”“万怡然提出……”，直接写“认同……”“提出……”。
- review_suggestion 必须是 10-30 字行动指南，只保留一句，不要加“复盘建议：”。

语义判断基线：
- 倾听者点头：通常是共鸣/认同/跟进，但低价值原文应放弃。
- 倾听者歪头：通常是存疑/困惑/保留。
- 倾听者看向侧方：如果对应复杂信息处理，可标为存疑；如果只是走神或低价值，放弃。
- 发言者看向侧方/歪头：通常是灵感闪念/思路推演。
- 发言者点头：通常是核心主张/向外传达。

输出 JSON schema：
{
  "cards": [
    {
      "action_id": "string",
      "keep": true,
      "role": "发言者|倾听者",
      "semantic_type": "共鸣|存疑|灵感闪念|核心主张",
      "source_speaker": "原文发言者",
      "source_excerpt": "摘取最关键的一段原文",
      "keyword_tags": ["2-4个关键词"],
      "title": "短标题",
      "interpretation": "后台推理说明，80字以内，不会显示在手机卡片上",
      "core_viewpoint": "一句话提炼该卡片最核心的信息",
      "thought_path": ["2-4个短步骤，每步不超过18字；仅灵感闪念/核心主张需要，可为空数组"],
      "review_suggestion": "10-30字行动指南，只写一句话",
      "confidence": 0.0
    }
  ],
  "discarded": [
    {
      "action_id": "string",
      "keep": false,
      "reason": "放弃原因"
    }
  ]
}

待处理动作：
${JSON.stringify(payload, null, 2)}`;
    }

    function parseGeminiJson(text) {
      const cleaned = String(text || "")
        .replace(/^```json\s*/i, "")
        .replace(/^```\s*/i, "")
        .replace(/```$/i, "")
        .trim();
      const first = cleaned.indexOf("{");
      const last = cleaned.lastIndexOf("}");
      const jsonText = first >= 0 && last >= first ? cleaned.slice(first, last + 1) : cleaned;
      return JSON.parse(jsonText);
    }

    function cardsFromGeminiOutput(output) {
      return (output.cards || []).filter(card => card.keep !== false).map(card => {
        const action = actions.find(item => item.action_id === card.action_id) || {};
        const anchor = findSegmentForAction(action) || findSegmentAt(action.start_time) || {};
        const category = semanticTypeToCategory(card.semantic_type);
        return {
          id: card.action_id,
          time: action.start_time || "",
          user: action.user || "",
          role: card.role || action.role_computed || "",
          category,
          semantic: card.semantic_type || categoryToSemanticType(category),
          decision: "AI保留",
          sourceSpeaker: card.source_speaker || card.sourceSpeaker || anchor.speaker || "",
          source: card.source_excerpt || "",
          evidence: `${actionLabel(action.action_type || "")} / ${action.imu_feature || ""}`,
          reason: `Gemini ${Math.round(Number(card.confidence || 0.8) * 100)}%`,
          title: card.title || card.core_viewpoint || card.source_excerpt || card.action_id,
          summary: card.core_viewpoint || card.source_excerpt || "",
          detail: card.review_suggestion || "",
          thoughtPath: Array.isArray(card.thought_path) ? card.thought_path.filter(Boolean) : [],
          tags: Array.isArray(card.keyword_tags) ? card.keyword_tags.filter(Boolean) : [],
          interpretation: card.interpretation || "",
          confidence: Number(card.confidence || 0)
        };
      });
    }

    function getSupabaseConfig() {
      const url = initialParams.get("sb_url") || $("supabaseUrl")?.value || defaultSupabaseUrl;
      const key = initialParams.get("sb_key") || $("supabaseKey")?.value || defaultSupabaseKey;
      return {
        url: String(url || "").trim().replace(/\/$/, ""),
        key: String(key || "").trim()
      };
    }

    function setCloudStatus(message, isHtml = false) {
      const target = $("cloudStatus");
      if (!target) return;
      if (isHtml) target.innerHTML = message;
      else target.textContent = message;
    }

    function createResultId() {
      if (crypto.randomUUID) return crypto.randomUUID().slice(0, 8);
      return Math.random().toString(36).slice(2, 10);
    }

    function ensureExportCards() {
      if (currentStep < steps.length) currentStep = steps.length;
      generatedCards = aiGeneratedCards || buildCards();
      return generatedCards;
    }

    function createCloudPayload() {
      const cards = ensureExportCards();
      return {
        version: 1,
        saved_at: new Date().toISOString(),
        meeting: {
          title: meetingTitle
        },
        selected_user: selectedUser,
        selected_user_display: displayUserName(selectedUser),
        active_filter: "all",
        transcript,
        actions,
        generated_cards: cards,
        ai_raw_output: aiRawOutput
      };
    }

    function buildCloudLink(id, config) {
      const url = new URL(window.location.href);
      url.search = "";
      url.hash = "";
      url.searchParams.set("view", "phone");
      url.searchParams.set("id", id);
      if (!defaultSupabaseUrl || !defaultSupabaseKey) {
        url.searchParams.set("sb_url", config.url);
        url.searchParams.set("sb_key", config.key);
      }
      return url.toString();
    }

    async function supabaseRequest(path, options = {}) {
      const config = getSupabaseConfig();
      if (!config.url || !config.key) {
        throw new Error("请先填写 Supabase Project URL 和 publishable key");
      }
      const response = await fetch(`${config.url}${path}`, {
        ...options,
        headers: {
          apikey: config.key,
          Authorization: `Bearer ${config.key}`,
          "Content-Type": "application/json",
          ...(options.headers || {})
        }
      });
      if (!response.ok) {
        const detail = await response.text();
        throw new Error(detail || `Supabase 请求失败：${response.status}`);
      }
      return response;
    }

    async function saveCloudResult() {
      const config = getSupabaseConfig();
      const id = createResultId();
      const payload = createCloudPayload();
      $("saveCloudBtn").disabled = true;
      $("saveCloudBtn").textContent = "保存中";
      setCloudStatus("正在保存到 Supabase...");
      try {
        await supabaseRequest("/rest/v1/demo_results", {
          method: "POST",
          headers: { Prefer: "return=minimal" },
          body: JSON.stringify({ id, payload })
        });
        $("cloudResultId").value = id;
        const link = buildCloudLink(id, config);
        setCloudStatus(`已保存。手机展示链接：<a href="${escapeHtml(link)}" target="_blank" rel="noreferrer">${escapeHtml(link)}</a>`, true);
        renderAll();
        saveState();
      } catch (error) {
        setCloudStatus(`保存失败：${error.message}`);
      } finally {
        $("saveCloudBtn").disabled = false;
        $("saveCloudBtn").textContent = "保存云端";
      }
    }

    function applyCloudPayload(payload) {
      meetingTitle = payload.meeting?.title || meetingTitle;
      transcript = Array.isArray(payload.transcript) ? payload.transcript : transcript;
      actions = Array.isArray(payload.actions) ? payload.actions : actions;
      selectedUser = payload.selected_user || selectedUser;
      aiRawOutput = payload.ai_raw_output || null;
      aiGeneratedCards = Array.isArray(payload.generated_cards)
        ? payload.generated_cards
        : aiRawOutput && Array.isArray(aiRawOutput.cards)
          ? cardsFromGeminiOutput(aiRawOutput)
          : null;
      currentStep = steps.length;
      selectedIndex = 0;
      activeFilter = payload.active_filter || "all";
      renderAll();
      saveState();
    }

    async function loadCloudResult(id, options = {}) {
      const resultId = String(id || "").trim();
      if (!resultId) throw new Error("请先填写展示 ID");
      if ($("cloudResultId")) $("cloudResultId").value = resultId;
      setCloudStatus(`正在读取展示 ID：${resultId}`);
      const response = await supabaseRequest(`/rest/v1/demo_results?id=eq.${encodeURIComponent(resultId)}&select=payload`, {
        method: "GET"
      });
      const rows = await response.json();
      if (!rows.length) throw new Error(`没有找到展示 ID：${resultId}`);
      applyCloudPayload(rows[0].payload || {});
      if (!options.silent) setCloudStatus(`已读取展示 ID：${resultId}`);
    }

    async function loadCloudResultFromInput() {
      try {
        await loadCloudResult($("cloudResultId").value);
      } catch (error) {
        setCloudStatus(`读取失败：${error.message}`);
      }
    }

    async function runGeminiSemanticProcessing() {
      const key = $("geminiKey").value.trim();
      const model = $("geminiModel").value || "gemini-2.5-flash";
      if (!key) {
        $("jsonView").textContent = "请先填写 Gemini API Key";
        return;
      }
      if (!getActiveActions().length) {
        $("jsonView").textContent = "当前用户没有可分析的动作";
        return;
      }

      $("geminiRunBtn").disabled = true;
      $("geminiRunBtn").textContent = "处理中";
      $("jsonView").textContent = "Gemini 正在判断动作价值和语义...";
      try {
        const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(model)}:generateContent?key=${encodeURIComponent(key)}`;
        const response = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{ parts: [{ text: buildGeminiPrompt() }] }],
            generationConfig: {
              temperature: 0.2,
              responseMimeType: "application/json"
            }
          })
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error?.message || `Gemini 请求失败：${response.status}`);
        }
        const text = (data.candidates?.[0]?.content?.parts || []).map(part => part.text || "").join("");
        const parsed = parseGeminiJson(text);
        aiRawOutput = parsed;
        aiGeneratedCards = cardsFromGeminiOutput(parsed);
        currentStep = steps.length;
        activeFilter = "all";
        renderAll();
        saveState();
      } catch (error) {
        aiGeneratedCards = null;
        aiRawOutput = {
          status: "error",
          message: error.message
        };
        currentStep = steps.length;
        renderAll();
        saveState();
      } finally {
        $("geminiRunBtn").disabled = false;
        $("geminiRunBtn").innerHTML = `<svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2 9.7 8.5 3 11l6.7 2.5L12 20l2.3-6.5L21 11l-6.7-2.5L12 2Z" fill="currentColor"/></svg>AI语义`;
      }
    }

    function actionCategoryFromSemantic(action) {
      const combined = [action.state_semantic, action.attitude_semantic, action.feedback_semantic, action.intent_analysis].filter(Boolean).join(" ");
      if (/存疑|困惑|质疑|断开|问题|不确定/.test(combined)) return "doubt";
      if (/灵感|推演|组织语言|思考|关注|理解中|听懂/.test(combined)) return "spark";
      if (/主张|传达|辅助表达/.test(combined)) return "claim";
      return "resonance";
    }

    function loadAlignedData(data, options = {}) {
      clearAiResults();
      selectedUser = "";
      meetingTitle = options.meetingTitle || data.meeting?.title || meetingTitle;
      transcript = data.segments.map((segment, index) => ({
        segment_id: segment.segment_id,
        start: segment.start_time || secondsToClock(index * 20),
        end: data.segments[index + 1]?.start_time || segment.start_time || secondsToClock(index * 20 + 18),
        speaker: segment.speaker,
        text: segment.text
      }));

      actions = data.actions.map((action, index) => ({
        action_id: action.action_id,
        user: action.participant_name || action.participant || "用户",
        start_time: action.anchor_time || "00:00:00",
        end_time: action.anchor_time || "00:00:00",
        action_type: normalizeActionType(action.action_label || action.imu_behavior || action.full_behavior),
        confidence: action.role_status === "match" ? 0.96 : 0.68,
        imu_feature: action.imu_behavior || action.full_behavior || action.action_label,
        notes: `${action.role_csv || action.role_computed || ""}${action.role_status === "check" ? " · 待核对" : ""}`,
        role_csv: action.role_csv,
        role_computed: action.role_computed,
        role_status: action.role_status,
        anchor_segment_id: action.anchor_segment_id,
        focus_text: action.focus_text,
        full_behavior: action.full_behavior,
        imu_behavior: action.imu_behavior,
        state_semantic: action.state_semantic,
        attitude_semantic: action.attitude_semantic,
        feedback_semantic: action.feedback_semantic,
        intent_analysis: action.intent_analysis,
        preferred_category: actionCategoryFromSemantic(action),
        source_index: index
      }));

      selectedIndex = 0;
      currentStep = 0;
      activeFilter = "all";
      generatedCards = [];
      if (options.render !== false) {
        renderAll();
        saveState();
      }
    }

    async function loadCase(caseName) {
      const response = await fetch(`data/${caseName.toLowerCase()}_aligned.json`);
      const data = await response.json();
      loadAlignedData(data, { meetingTitle: caseName.toLowerCase() === "case1" ? "TT设计学院访谈1" : "TT设计学院访谈4" });
    }

    function isMobileAppViewport() {
      return window.matchMedia("(max-width: 720px)").matches;
    }

    async function loadMobileDemoFallback() {
      try {
        const response = await fetch("data/case2_aligned.json");
        const data = await response.json();
        loadAlignedData(data, { render: false, meetingTitle: "TT设计学院访谈4" });
      } catch (error) {
        console.warn("Mobile demo data was not loaded", error);
      }
      currentStep = steps.length;
      activeFilter = "all";
      renderAll();
      saveState();
    }

    function splitCsvLine(line) {
      const cells = [];
      let current = "";
      let quoted = false;
      for (let index = 0; index < line.length; index += 1) {
        const char = line[index];
        if (char === '"' && line[index + 1] === '"') {
          current += '"';
          index += 1;
        } else if (char === '"') {
          quoted = !quoted;
        } else if (char === "," && !quoted) {
          cells.push(current);
          current = "";
        } else {
          current += char;
        }
      }
      cells.push(current);
      return cells;
    }

    function renderAll() {
      currentStep = Math.min(currentStep, steps.length);
      ensureSelectedScope();
      renderTranscript();
      renderUserSelect();
      renderActions();
      renderSteps();
      renderEvidence();
      renderJson();
      renderPhone();
    }

    $("nextBtn").addEventListener("click", () => {
      currentStep = Math.min(currentStep + 1, steps.length);
      renderAll();
      saveState();
    });

    $("runAllBtn").addEventListener("click", () => {
      currentStep = steps.length;
      renderAll();
      saveState();
    });

    $("geminiRunBtn").addEventListener("click", () => {
      runGeminiSemanticProcessing();
    });

    $("resetBtn").addEventListener("click", () => {
      clearAiResults();
      currentStep = 0;
      selectedIndex = 0;
      activeFilter = "all";
      renderAll();
      saveState();
    });

    $("sampleBtn").addEventListener("click", () => {
      clearAiResults();
      selectedUser = "";
      meetingTitle = "TT设计学院访谈";
      transcript = structuredClone(sampleTranscript);
      actions = structuredClone(sampleActions);
      currentStep = 0;
      selectedIndex = 0;
      activeFilter = "all";
      renderAll();
      saveState();
    });

    $("case1Btn").addEventListener("click", () => {
      loadCase("case1");
    });

    $("case2Btn").addEventListener("click", () => {
      loadCase("case2");
    });

    $("userSelect").addEventListener("change", (event) => {
      selectedUser = event.target.value;
      clearAiResults();
      activeFilter = "all";
      currentStep = Math.min(currentStep, steps.length);
      ensureSelectedScope();
      renderAll();
      saveState();
    });

    $("csvInput").addEventListener("change", async (event) => {
      const file = event.target.files?.[0];
      if (!file) return;
      const text = await file.text();
      const parsed = parseCsv(text);
      if (parsed.length) {
        clearAiResults();
        selectedUser = "";
        actions = parsed;
        currentStep = 0;
        selectedIndex = 0;
        activeFilter = "all";
        renderAll();
        saveState();
      }
      event.target.value = "";
    });

    $("jsonInput").addEventListener("change", async (event) => {
      const file = event.target.files?.[0];
      if (!file) return;
      const text = await file.text();
      const parsed = parseActionEventsJson(text);
      if (parsed.length) {
        clearAiResults();
        selectedUser = "";
        actions = parsed;
        currentStep = 0;
        selectedIndex = 0;
        activeFilter = "all";
        renderAll();
        saveState();
      }
      event.target.value = "";
    });

    $("geminiKey").addEventListener("input", saveState);
    $("geminiModel").addEventListener("change", saveState);
    $("supabaseUrl").addEventListener("input", saveState);
    $("supabaseKey").addEventListener("input", saveState);
    $("saveCloudBtn").addEventListener("click", saveCloudResult);
    $("loadCloudBtn").addEventListener("click", loadCloudResultFromInput);

    const restored = restoreState();
    const bootResultId = initialParams.get("id") || initialParams.get("result");
    if (bootResultId) {
      loadCloudResult(bootResultId, { silent: true }).catch(error => {
        console.warn("Cloud result was not loaded", error);
        currentStep = steps.length;
        renderAll();
        $("phoneCards").innerHTML = `<div class="empty">云端结果读取失败：${escapeHtml(error.message)}</div>`;
        setCloudStatus(`读取失败：${error.message}`);
      });
    } else if (!restored && isMobileAppViewport()) {
      loadMobileDemoFallback();
    } else {
      renderAll();
    }
  </script>
